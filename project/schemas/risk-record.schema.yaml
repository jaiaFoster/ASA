---
# Risk Record Schema — JSON Schema Draft 2020-12 expressed as YAML
#
# Risk Classification Notes (per RISK-001):
#   - Risk classes: R0 < R1 < R2 < R3 < R4 < R5 (strictly ordered)
#   - deterministic_class: computed from declared_properties
#   - manual_override: may only INCREASE risk above deterministic_class
#   - effective_class: must be >= deterministic_class
#   - The validator enforces that effective_class >= deterministic_class.
#     This rule cannot be expressed in JSON Schema alone and is a validator responsibility.
#   - Confirmed risk status requires property_confirmation with confirmed: true
"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "asa2/pos/risk-record"
title: Risk Record
type: object
required:
  - id
  - subject_type
  - subject_id
  - status
  - declared_properties
  - deterministic_class
  - manual_override
  - effective_class
  - classification_rationale
  - property_confirmation
  - classified_by
  - confirmed_by
  - created_at
  - updated_at
properties:
  id:
    type: string
    pattern: "^ASA2-RISK-[0-9]+"
  subject_type:
    type: string
    enum:
      - work_item
      - assignment
      - repository_change
      - deployment
      - governance_change
  subject_id:
    type: string
    minLength: 1
  status:
    type: string
    enum:
      - draft
      - classified
      - confirmed
      - superseded
  declared_properties:
    type: object
    properties:
      touches_governance:
        type: boolean
      touches_pos_tooling:
        type: boolean
      touches_production:
        type: boolean
      touches_broker:
        type: boolean
      touches_strategy:
        type: boolean
      touches_security:
        type: boolean
      touches_credentials:
        type: boolean
      touches_external_users:
        type: boolean
      changes_authority:
        type: boolean
      changes_risk_rules:
        type: boolean
      data_destructive:
        type: boolean
      reversible:
        type: boolean
    additionalProperties: true
  deterministic_class:
    type: string
    enum: [R0, R1, R2, R3, R4, R5]
  manual_override:
    oneOf:
      - type: "null"
      - type: object
        required:
          - requested_class
          - reason
          - authorized_by
          - created_at
        properties:
          requested_class:
            type: string
            enum: [R0, R1, R2, R3, R4, R5]
          reason:
            type: string
            minLength: 1
          authorized_by:
            type: string
            minLength: 1
          created_at:
            type: string
            format: date-time
        additionalProperties: false
  effective_class:
    type: string
    enum: [R0, R1, R2, R3, R4, R5]
  classification_rationale:
    type: string
    minLength: 1
  property_confirmation:
    type: object
    required:
      - confirmed
      - confirmed_by
      - confirmed_at
      - notes
    properties:
      confirmed:
        type: boolean
      confirmed_by:
        type: [string, "null"]
      confirmed_at:
        type: [string, "null"]
        format: date-time
      notes:
        type: [string, "null"]
    additionalProperties: false
  classified_by:
    type: string
    minLength: 1
  confirmed_by:
    type: [string, "null"]
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
additionalProperties: false
