---
"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "asa2/pos/assignment"
title: Assignment
type: object
required:
  - id
  - work_item_id
  - worker_type
  - status
  - base_commit
  - objective
  - allowed_scope
  - forbidden_scope
  - required_tests
  - required_outputs
  - result_path
  - assigned_by
  - acceptance_authority
  - created_at
  - updated_at
properties:
  id:
    type: string
    pattern: "^ASSIGN-[0-9]+"
  work_item_id:
    type: string
  worker_type:
    type: string
  status:
    type: string
    enum:
      - draft
      - issued
      - acknowledged
      - in_progress
      - submitted
      - closed
      - cancelled
  base_commit:
    type: string
  objective:
    type: string
    minLength: 1
  allowed_scope:
    type: array
    items:
      type: string
  forbidden_scope:
    type: array
    items:
      type: string
  required_tests:
    type: array
    items:
      type: string
  required_outputs:
    type: array
    items:
      type: string
  result_path:
    type: [string, "null"]
  assigned_by:
    type: string
  acceptance_authority:
    type: string
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
additionalProperties: false
