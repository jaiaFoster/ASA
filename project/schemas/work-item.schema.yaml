---
# Work Item Schema — JSON Schema Draft 2020-12 expressed as YAML
# Note: The constraint that effective_risk_class may not fall below deterministic_class
# cannot be expressed purely in JSON Schema. This is enforced by the POS validator.
"$schema": "https://json-schema.org/draft/2020-12/schema"
"$id": "asa2/pos/work-item"
title: Work Item
type: object
required:
  - id
  - title
  - status
  - objective
  - scope
  - risk
  - owner_role
  - acceptance_authority
  - dependencies
  - artifacts
  - evidence
  - created_at
  - updated_at
properties:
  id:
    type: string
    pattern: "^WI-[0-9]+"
  title:
    type: string
    minLength: 1
  status:
    type: string
    enum:
      - proposed
      - ready
      - assigned
      - in_progress
      - blocked
      - review
      - accepted
      - rejected
      - cancelled
  objective:
    type: string
    minLength: 1
  scope:
    type: string
    minLength: 1
  risk:
    type: object
    required:
      - declared_properties
      - deterministic_class
      - manual_override
      - effective_class
    properties:
      declared_properties:
        type: object
        additionalProperties: true
      deterministic_class:
        type: string
        enum: [R0, R1, R2, R3, R4, R5]
      manual_override:
        type: [string, "null"]
        enum: [R0, R1, R2, R3, R4, R5, null]
      effective_class:
        type: string
        enum: [R0, R1, R2, R3, R4, R5]
  owner_role:
    type: string
  acceptance_authority:
    type: string
  dependencies:
    type: array
    items:
      type: string
  artifacts:
    type: array
    items:
      type: string
  evidence:
    type: array
    items:
      type: string
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
additionalProperties: false
