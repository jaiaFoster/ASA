services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asa}
      POSTGRES_USER: ${POSTGRES_USER:-asa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    environment:
      ASA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-asa}:${POSTGRES_PASSWORD:-asa}@postgres:5432/${POSTGRES_DB:-asa}
      ASA_ENVIRONMENT: development
      ASA_QUOTE_PROVIDER: deterministic_fake
      ASA_CORS_ORIGINS: http://localhost:5173
    command: >-
      sh -c "pip install -e . && alembic upgrade head && python -m asa"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  frontend_node_modules:
