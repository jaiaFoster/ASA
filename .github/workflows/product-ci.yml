name: Product CI

on:
  pull_request:
    paths:
      - "asa/**"
      - "tests/asa/**"
      - "migrations/**"
      - "alembic.ini"
      - "pyproject.toml"
      - "requirements.txt"
      - ".python-version"
      - "frontend/**"
      - "compose.yaml"
      - ".github/workflows/product-ci.yml"
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: asa_test
          POSTGRES_USER: asa
          POSTGRES_PASSWORD: asa
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U asa -d asa_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      ASA_DATABASE_URL: postgresql+psycopg://asa:asa@localhost:5432/asa_test
      ASA_TEST_DATABASE_URL: postgresql+psycopg://asa:asa@localhost:5432/asa_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: python -m ruff check asa tests/asa
      - run: python -m mypy asa
      - run: alembic upgrade head
      - run: python -m pytest tests/asa -q
      - run: alembic downgrade base && alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run generate:api
      - run: git diff --exit-code -- src/api/generated
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build
