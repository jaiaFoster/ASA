name: Validate Architecture

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'providers/**'
      - 'observation/**'
      - 'reconciliation/**'
      - 'facts/**'
      - 'indicators/**'
      - 'strategies/**'
      - 'guardrails/**'
      - 'ranking/**'
      - 'position_proposals/**'
      - 'portfolio/**'
      - 'execution_planning/**'
      - 'presentation/**'
      - 'domain/**'
      - 'market_data/**'
      - 'asa/**'
      - 'docs/providers/**'
      - 'architecture/**'
      - 'tests/architecture/**'
      - 'tests/domain/**'
      - 'tests/market_data/**'
      - 'tests/observation/**'
      - 'tests/providers/**'
      - 'tests/reconciliation/**'
      - 'tests/facts/**'
      - 'tests/indicators/**'
      - 'tests/strategies/**'
      - 'tests/guardrails/**'
      - 'tests/ranking/**'
      - 'tests/position_proposals/**'
      - 'tests/portfolio/**'
      - 'tests/execution_planning/**'
  workflow_dispatch:

jobs:
  validate:
    name: Architecture Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run architecture and intelligence pipeline tests
        run: >-
          python -m pytest
          tests/architecture
          tests/domain
          tests/observation
          tests/providers
          tests/reconciliation
          tests/facts
          tests/indicators
          tests/strategies
          tests/guardrails
          tests/ranking
          tests/position_proposals
          tests/portfolio
          tests/execution_planning
          -v

      - name: Check generated provider documentation drift
        run: PYTHONPATH=. python -m market_data.documentation

# Mechanical checks only. A passing workflow does NOT constitute approval,
# merge authorization, or deployment authorization.
