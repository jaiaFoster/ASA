name: Validate POS

on:
  pull_request:
    paths:
      - 'governance/**'
      - 'project/**'
      - 'tools/pos/**'
      - 'tests/pos/**'
      - 'AGENTS.md'
      - 'CURRENT_STATE.md'
      - 'MANAGER_INBOX.md'
  workflow_dispatch:

jobs:
  validate:
    name: POS Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r tools/pos/requirements.txt

      - name: Run tests
        run: python -m pytest tests/pos -v

      - name: Run validator
        run: python tools/pos/validate.py

      - name: Run generator
        run: python tools/pos/generate.py

      - name: Check for uncommitted generation changes
        run: |
          git diff --exit-code project/generated/ AGENTS.md CURRENT_STATE.md MANAGER_INBOX.md || \
          (echo "ERROR: Generated files are out of date. Regenerate with: python tools/pos/generate.py" && exit 1)

# This workflow performs mechanical checks only.
# A passing workflow does NOT constitute approval, merge authorization,
# or deployment authorization. All such decisions require Founder action.
