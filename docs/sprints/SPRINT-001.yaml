---
id: SPRINT-001
codename: Execution Intelligence
version: 1.3
status: COMPLETE
type: IMPLEMENTATION_SPRINT

amendment:
  governance_amendment: GOV-AMD-001-013
  scope: governance_workflow_only
  summary: >
    Activates the bounded Founder Sprint Delegation accepted in Amendment 013.
    All technical scope, validation, acceptance, architecture, determinism,
    replay, and stop requirements remain unchanged from v1.1.

objective: >
  Implement the complete execution-intelligence layer defined by
  ASA-ARCH-001 and ASA-ARCH-002 without modifying the analytical
  architecture, governance, or constitutional boundaries.

prerequisites:
  architecture:
    - ASA-ARCH-001
    - ASA-ARCH-002

repository:
  default_branch: main

execution:
  mode: founder_authorized_autonomous_sprint

  authority:
    implementation: true
    testing: true
    documentation: true
    refactoring: true
    issue_creation: true
    pull_request_creation: true
    pull_request_merge: true
    merge_delegation:
      amendment: GOV-AMD-001-013
      founder_authorized: true
      delegate: ROLE-WORKER
      limited_to_sprint: SPRINT-001
      approved_tickets:
        - ASA-CORE-008
        - ASA-CORE-009
        - ASA-CORE-010

  review:
    self_review_required: true

  merge_strategy:
    sequential_delegated_merges: true

workflow:
  - implement_ticket
  - run_all_validation_gates
  - self_review
  - open_pull_request
  - verify_all_required_gates
  - merge_if_green_and_within_delegation
  - verify_main_contains_merged_commit
  - begin_next_ticket
  - generate_final_report

tickets:
  - id: ASA-CORE-008
    title: Position Proposal Engine
    objective: >
      Transform RankingResult into ProposedPosition using deterministic
      allocation policy while remaining completely independent of the
      current portfolio.
    input:
      - RankingResult
    output:
      - ProposedPosition
    responsibilities:
      - target allocation
      - desired exposure
      - confidence propagation
      - rationale propagation
      - sizing policy
      - deterministic identity generation
      - replay safety
    prohibited:
      - PortfolioSnapshot
      - Holding
      - buying power
      - cash analysis
      - diversification
      - execution planning
      - broker interaction
      - persistence
      - networking
    acceptance:
      - immutable output
      - deterministic replay
      - policy version recorded
      - complete unit tests
      - architecture tests pass

  - id: ASA-CORE-009
    title: Portfolio Engine
    objective: >
      Evaluate desired positions against the current immutable portfolio
      snapshot and produce deterministic portfolio decisions.
    input:
      - ProposedPosition
      - PortfolioSnapshot
    output:
      - PortfolioDecision
    responsibilities:
      - buying power policy
      - concentration policy
      - diversification policy
      - overlap detection
      - cash reserve policy
      - rejection policy
      - acceptance policy
      - deterministic reasoning
    prohibited:
      - execution planning
      - broker interaction
      - networking
      - persistence
    acceptance:
      - deterministic
      - immutable
      - replay stable
      - complete test coverage

  - id: ASA-CORE-010
    title: Execution Planner
    objective: >
      Transform portfolio decisions into deterministic broker-neutral
      execution plans.
    input:
      - PortfolioDecision
      - ExecutionContext
    output:
      - ExecutionPlan
    responsibilities:
      - quantity calculation
      - execution sequencing
      - order decomposition
      - execution metadata
      - deterministic planning
    prohibited:
      - broker SDKs
      - broker APIs
      - authentication
      - credentials
      - networking
      - persistence
      - provider payloads
    acceptance:
      - deterministic
      - immutable
      - replay stable
      - complete unit tests

authority:
  worker:
    may:
      - implement ticket logic
      - create helper modules
      - add tests
      - improve documentation
      - perform bounded refactors
      - create pull requests
      - update pull requests
      - self review
      - mark READY_FOR_FOUNDER_MERGE
      - merge enumerated SPRINT-001 implementation pull requests after every required gate passes
      - observe repository state
      - continue after Founder merge
    may_not:
      - merge pull requests outside the active SPRINT-001 delegation
      - bypass branch protection
      - modify frozen governance
      - modify Constitution
      - introduce new pipeline stages
      - introduce new immutable domain contracts
      - change ADR intent
      - introduce provider-specific behavior
      - introduce broker communication
      - introduce persistence

stop_conditions:
  architecture:
    - missing upstream contract
    - contract ambiguity
    - conflicting ADR
    - constitutional conflict
  governance:
    - frozen governance conflict
  implementation:
    - required domain model missing

on_stop:
  - open_github_issue
  - document_blocker
  - terminate_remaining_sprint

validation:
  required:
    - pytest
    - mypy
    - ruff
    - architecture validation
    - dependency validation
    - forbidden import validation
    - circular dependency validation
    - deterministic replay validation
    - immutable contract validation
    - identity validation
    - integrity validation
    - git diff --check

self_review:
  required: true
  checklist:
    architecture:
      - contract boundaries preserved
      - analytical pipeline preserved
      - no provider leakage
      - no infrastructure leakage
    governance:
      - Constitution unchanged
      - frozen governance unchanged
    implementation:
      - acceptance criteria satisfied
      - deterministic outputs
      - replay stable
      - adequate unit coverage
      - adequate architecture coverage

merge:
  policy: founder_sprint_delegation
  cadence:
    after_each_ticket: true
  authority:
    ultimate: Founder
    delegate: ROLE-WORKER
    amendment: GOV-AMD-001-013
  continue_condition: >
    The worker verifies that main contains the merged ticket commit before
    beginning the next ticket.
  readiness_conditions:
    validation_passed: true
    self_review_passed: true
    blocking_issues: 0
    unresolved_todos: 0
    skipped_tests: 0
    architecture_preserved: true
    governance_preserved: true
  on_failure:
    - do_not_merge
    - open_issue
    - stop_sprint
  expires:
    - sprint_complete
    - sprint_stopped
    - Founder_revokes_delegation

report:
  required: true
  destination: project/reports/SPRINT-001.md
  contents:
    - sprint summary
    - completed tickets
    - merged pull requests
    - validation results
    - architecture verification
    - governance verification
    - replay verification
    - coverage summary
    - discovered defects
    - resolved defects
    - remaining issues
    - recommendations
    - risk assessment

success:
  repository_state:
    - main branch green
    - all validation passing
    - deterministic replay preserved
    - no constitutional violations
    - no governance violations
  implemented_pipeline:
    - Observation
    - CanonicalFact
    - Indicator
    - Opportunity
    - Guardrails
    - RankingResult
    - PositionProposalEngine
    - ProposedPosition
    - PortfolioEngine
    - PortfolioDecision
    - ExecutionPlanner
    - ExecutionPlan
    - BrokerRequest
  explicitly_not_in_scope:
    - broker adapters
    - live execution
    - authentication
    - persistence
    - infrastructure
    - external APIs
    - provider integrations

definition_of_done: >
  The sprint is complete when ASA can deterministically transform
  RankingResult into BrokerRequest entirely within the analytical domain,
  every ticket has been implemented and merged by the authority applicable
  under Accepted Amendment 013 after passing all validation gates, the default
  branch remains continuously green after each merge, and a final sprint report
  has been committed documenting the
  implementation, verification results, and recommendations for the next
  sprint.

completion:
  completed_at: "2026-07-21T15:16:44Z"
  final_technical_commit: b85291bb7fb0f7665da3bb03d6fa4f4497276f7f
  completed_tickets:
    - ASA-CORE-008
    - ASA-CORE-009
    - ASA-CORE-010
  merged_pull_requests:
    - 65
    - 69
    - 72
  architecture_amendment_pull_request: 71
  report: project/reports/SPRINT-001.md
  delegation_status_after_completion: expired
